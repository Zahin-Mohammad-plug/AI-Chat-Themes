<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat Themes</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="hdr">
      <div class="title">AI Chat Themes</div>
      <div class="sub" id="host-label">Detecting…</div>
    </header>

    <section id="controls" class="controls hidden">
      <label class="toggle">
        <input type="checkbox" id="enable-toggle" />
        <span id="toggle-label">Enabled</span>
      </label>
    </section>

    <section id="gallery" class="gallery hidden" aria-label="Theme gallery"></section>

    <section id="unsupported" class="unsupported hidden">
      <p>Open <strong>chatgpt.com</strong> or <strong>claude.ai</strong> to pick a theme.</p>
    </section>

    <footer class="ftr">Not affiliated with OpenAI or Anthropic.</footer>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
