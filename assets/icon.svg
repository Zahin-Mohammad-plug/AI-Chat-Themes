<svg width="100%" height="100%" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b9bff" />
      <stop offset="0.55" stop-color="#7c6bff" />
      <stop offset="1" stop-color="#b86bff" />
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <clipPath id="bubbleClip">
      <path d="M64 22
               C40 22 22 38 22 60
               C22 75 30 87 43 94
               L40 110
               L58 98
               C60 98 62 99 64 99
               C88 99 106 82 106 60
               C106 38 88 22 64 22 Z" />
    </clipPath>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#tile)" />
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#sheen)" />

  <!-- Speech bubble, split light / dark = chat themes + dark mode -->
  <g clip-path="url(#bubbleClip)">
    <rect x="22" y="18" width="42" height="96" fill="#fbfbfd" />
    <rect x="64" y="18" width="42" height="96" fill="#1b1b24" />
  </g>
  <!-- Bubble outline for crispness on the gradient -->
  <path d="M64 22
           C40 22 22 38 22 60
           C22 75 30 87 43 94
           L40 110
           L58 98
           C60 98 62 99 64 99
           C88 99 106 82 106 60
           C106 38 88 22 64 22 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3" stroke-linejoin="round" />
  <!-- Center divider -->
  <line x1="64" y1="26" x2="64" y2="96" stroke="#7c6bff" stroke-opacity="0.55" stroke-width="2.5" />
</svg>
